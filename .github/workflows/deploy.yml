name: CI/CD Pipeline

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  # Job 1: 代码质量检查
  lint-and-check:
    name: Code Quality Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8
          pip install -r requirements.txt

      - name: Lint check
        run: |
          flake8 app/ --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 app/ --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

  # Job 2: 自动部署到阿里云
  deploy-to-production:
    name: Deploy to Aliyun
    runs-on: ubuntu-latest
    needs: lint-and-check
    if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main')
    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.1.0
        with:
          host: ${{ secrets.ALIYUN_HOST }}
          username: ${{ secrets.ALIYUN_USER }}
          key: ${{ secrets.ALIYUN_SSH_KEY }}
          port: 22
          script: |
            set -e
            echo "=== 开始部署 Todo App ==="

            # 首次部署自动初始化
            if [ ! -d "/var/www/todo-app/.git" ]; then
              echo "[首次部署] 初始化项目目录..."
              sudo mkdir -p /var/www/todo-app
              sudo chown -R $USER:$USER /var/www/todo-app
              git clone https://github.com/YimYOUNG/ToDo-_FastApi_MySql.git /var/www/todo-app
              cd /var/www/todo-app
            else
              cd /var/www/todo-app
              echo "[1/5] 拉取最新代码..."
              git fetch origin
              git reset --hard origin/main
            fi

            echo "[2/5] 创建/更新 .env..."
            if [ ! -f ".env" ]; then
              cp .env.example .env
              echo "⚠️ 请手动修改 .env 中的数据库密码！"
            fi

            echo "[3/5] 安装依赖..."
            if [ ! -d "venv" ]; then
              python3.11 -m venv venv
            fi
            source venv/bin/activate
            pip install --upgrade pip -q
            pip install -r requirements.txt -q

            echo "[4/5] 数据库迁移..."
            alembic upgrade head || echo "⚠️ 迁移失败，尝试初始化..."
            python init_db.py 2>/dev/null || true

            echo "[5/5] 启动服务..."
            sudo cp todo-app.service /etc/systemd/system/ 2>/dev/null || true
            sudo systemctl daemon-reload
            sudo systemctl enable todo-app 2>/dev/null || true
            sudo systemctl restart todo-app

            echo "=== 部署完成 ==="

      - name: Health check
        run: |
          echo "检查服务状态..."
          sleep 15
          for i in {1..3}; do
            echo "第 $i 次尝试..."
            response=$(curl -sf http://${{ secrets.ALIYUN_HOST }}/health 2>/dev/null || echo "")
            if echo "$response" | grep -q '"status":"healthy"'; then
              echo "✅ 健康检查通过！"
              exit 0
            fi
            sleep 10
          done
          echo "❌ 健康检查失败，请手动排查。"
          exit 1