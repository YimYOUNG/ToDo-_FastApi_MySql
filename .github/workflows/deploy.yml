name: CI/CD Pipeline

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  # Job 1: 代码质量检查（始终运行）
  lint-and-check:
    name: Code Quality Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8 black isort
          pip install -r requirements.txt

      - name: Lint with flake8
        run: |
          flake8 app/ --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 app/ --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

      - name: Check code formatting
        run: |
          black --check app/
          isort --check-only app/

  # Job 2: 部署到阿里云（仅在 master/main 分支且配置了 Secrets 时运行）
  deploy-to-production:
    name: Deploy to Aliyun Server
    runs-on: ubuntu-latest
    needs: lint-and-check
    # 只在推送到 master/main 分支时部署，不在 PR 时运行
    if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main')
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1.1.0
        with:
          host: ${{ secrets.ALIYUN_HOST }}
          username: ${{ secrets.ALIYUN_USER }}
          key: ${{ secrets.ALIYUN_SSH_KEY }}
          port: 22
          script: |
            set -e
            echo "=== 开始部署 Todo App ==="
            
            cd /var/www/todo-app || exit 1
            
            echo "[1/5] 拉取最新代码..."
            git fetch origin
            git reset --hard origin/master
            
            echo "[2/5] 安装/更新依赖..."
            source venv/bin/activate
            pip install --upgrade pip
            pip install -r requirements.txt
            
            echo "[3/5] 执行数据库迁移..."
            alembic upgrade head || echo "警告：数据库迁移失败（可能是首次部署）"
            
            echo "[4/5] 重启服务..."
            sudo systemctl restart todo-app || sudo systemctl start todo-app
            
            echo "[5/5] 等待服务启动..."
            sleep 10
            
            echo "=== 部署完成 ==="
            systemctl status todo-app --no-pager

      - name: Health check
        run: |
          echo "等待服务器响应..."
          sleep 15
          
          # 尝试健康检查（最多3次）
          for i in {1..3}; do
            echo "第 $i 次尝试健康检查..."
            response=$(curl -sf http://${{ secrets.ALIYUN_HOST }}/health 2>/dev/null || echo "")
            
            if echo "$response" | grep -q '"status":"healthy"'; then
              echo "✅ 健康检查通过！"
              echo "$response"
              exit 0
            fi
            
            echo "⏳ 等待 10 秒后重试..."
            sleep 10
          done
          
          echo "❌ 健康检查失败！请手动检查服务器日志。"
          exit 1