{% extends "base.html" %}

{% block title %}团队协作 - Todo App{% endblock %}

{% block content %}
<div class="d-flex justify-between align-center mb-3">
    <h1>👥 团队协作</h1>
</div>

<div class="tabs mb-3">
    <button class="tab-btn active" onclick="switchTab('shared-by-me')">我分享的</button>
    <button class="tab-btn" onclick="switchTab('shared-with-me')">收到的共享</button>
</div>

<div id="sharedByMePanel">
    <div class="card mb-3">
        <h3 style="margin-bottom:16px;">分享待办给他人</h3>
        <form onsubmit="handleShare(event)">
            <div class="form-group">
                <label for="shareTodoId">选择待办事项</label>
                <select id="shareTodoId" class="form-control" required>
                    <option value="">-- 请选择 --</option>
                </select>
            </div>
            <div class="form-group">
                <label for="shareUsername">对方用户名</label>
                <input type="text" id="shareUsername" class="form-control" required
                       placeholder="输入要分享给的用户的用户名">
            </div>
            <div class="form-group">
                <label for="sharePermission">权限</label>
                <select id="sharePermission" class="form-control">
                    <option value="read">只读</option>
                    <option value="write">可编辑</option>
                </select>
            </div>
            <button type="submit" class="btn btn-primary">确认分享</button>
        </form>
    </div>

    <div class="card">
        <h3 style="margin-bottom:16px;">我已分享的列表</h3>
        <div id="mySharesList">
            <p style="color:var(--text-secondary);text-align:center;padding:20px;">加载中...</p>
        </div>
    </div>
</div>

<div id="sharedWithMePanel" style="display:none;">
    <div class="card">
        <h3 style="margin-bottom:16px;">别人分享给我的</h3>
        <div id="receivedList">
            <p style="color:var(--text-secondary);text-align:center;padding:20px;">加载中...</p>
        </div>
    </div>
</div>

<style>
.tabs { display:flex; gap:4px; background:var(--bg-card); padding:4px; border-radius:var(--radius); width:fit-content; }
.tab-btn { padding:8px 24px; border:none; background:none; cursor:pointer; border-radius:6px; font-weight:500; color:var(--text-secondary); transition:all 0.2s; }
.tab-btn.active { background:var(--primary-color); color:white; }
.share-item { display:flex;align-items:center;justify-content:space-between;padding:12px;border-bottom:1px solid var(--border-color); }
.share-item:last-child { border-bottom:none; }
.share-info { flex:1; }
.share-info strong { display:block; margin-bottom:4px; }
.share-meta { font-size:0.85rem; color:var(--text-secondary); }
.permission-badge { font-size:0.8rem; padding:3px 10px; border-radius:12px; }
.perm-read { background:#e3f2fd;color:#1565c0; }
.perm-write { background:#e8f5e9;color:#2e7d32; }
.empty-state { text-align:center; padding:40px; color:var(--text-secondary); }
</style>

<script>
async function loadMyTodosForShare() {
    try {
        const data = await apiGet('/todos?page_size=100');
        const sel = document.getElementById('shareTodoId');
        if (data.items) {
            data.items.forEach(t => {
                const opt = document.createElement('option');
                opt.value = t.id;
                opt.textContent = t.title;
                sel.appendChild(opt);
            });
        }
    } catch(e) {}
}

async function handleShare(e) {
    e.preventDefault();
    const todoId = document.getElementById('shareTodoId').value;
    const username = document.getElementById('shareUsername').value.trim();
    const permission = document.getElementById('sharePermission').value;

    if (!todoId || !username) return;

    try {
        await apiPost(`/collaboration/${todoId}/share`, { username, permission });
        alert('分享成功！');
        document.getElementById('shareUsername').value = '';
        loadMyShares();
    } catch(err) {
        alert('分享失败：' + err.message);
    }
}

async function loadMyShares() {
    try {
        console.log('加载我分享的列表...');
        const shares = await apiGet('/collaboration/shared-by-me');
        const container = document.getElementById('mySharesList');

        if (!shares || shares.length === 0) {
            container.innerHTML = '<div class="empty-state">📤 你还没有分享过任何待办事项</div>';
            return;
        }

        let html = '';
        shares.forEach(s => {
            html += `
                <div class="share-item">
                    <div class="share-info">
                        <strong>📋 ${escapeHtml(s.todo_title)}</strong>
                        <div class="share-meta">
                            分享给: <strong>${escapeHtml(s.shared_with)}</strong> |
                            权限: <span class="permission-badge perm-${s.permission}">${s.permission === 'write' ? '可编辑' : '只读'}</span>
                        </div>
                    </div>
                    <button class="btn btn-sm btn-danger" onclick="unshare('${escapeHtml(s.todo_id)}', '${escapeHtml(s.id)}')">取消分享</button>
                </div>`;
        });
        container.innerHTML = html;
        console.log('我分享的列表加载完成, 共', shares.length, '条');
    } catch(e) {
        console.error('加载分享列表失败:', e);
        document.getElementById('mySharesList').innerHTML =
            `<div class="empty-state">⚠️ 加载失败: ${escapeHtml(e.message)}</div>`;
    }
}

async function unshare(todoId, shareId) {
    if (!confirm('确定取消这个分享吗？')) return;
    try {
        await apiDelete(`/collaboration/${todoId}/unshare/${shareId}`);
        alert('已取消分享');
        loadMyShares();
    } catch(e) {
        alert('操作失败：' + e.message);
    }
}

function switchTab(tab) {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    event.target.classList.add('active');

    if (tab === 'shared-by-me') {
        document.getElementById('sharedByMePanel').style.display = 'block';
        document.getElementById('sharedWithMePanel').style.display = 'none';
        loadMyShares();
    } else {
        document.getElementById('sharedByMePanel').style.display = 'none';
        document.getElementById('sharedWithMePanel').style.display = 'block';
        loadReceived();
    }
}

async function loadReceived() {
    const container = document.getElementById('receivedList');

    try {
        console.log('加载收到的共享...');
        container.innerHTML = '<div class="empty-state">⏳ 加载中...</div>';

        const shares = await apiGet('/collaboration/shared');
        console.log('收到共享数据:', shares);

        if (!shares || shares.length === 0) {
            container.innerHTML = `
                <div class="empty-state" style="padding:40px;">
                    <p style="font-size:2rem;margin-bottom:12px;">📥</p>
                    <p>暂时没有收到任何共享</p>
                    <p style="font-size:0.85rem;color:var(--text-secondary);margin-top:8px;">
                        当其他用户分享待办给你时，会在这里显示
                    </p>
                </div>`;
            return;
        }

        let html = '';
        shares.forEach(s => {
            html += `
                <div class="share-item">
                    <div class="share-info">
                        <strong>📋 ${escapeHtml(s.todo_title || '未知待办')}</strong>
                        <div class="share-meta">
                            来自: <strong>${escapeHtml(s.shared_by || '未知用户')}</strong> |
                            权限: <span class="permission-badge perm-${s.permission}">${s.permission === 'write' ? '可编辑' : '只读'}</span>
                        </div>
                    </div>
                    <a href="/todos" class="btn btn-sm btn-outline">查看详情</a>
                </div>`;
        });
        container.innerHTML = html;
        console.log('收到的共享加载完成, 共', shares.length, '条');
    } catch(e) {
        console.error('加载收到的共享失败:', e);
        console.error('错误详情:', JSON.stringify(e, null, 2));

        let errorMsg = e.message || 'Request failed';
        let errorTip = '';

        if (errorMsg.includes('401') || errorMsg.includes('authenticated')) {
            errorTip = '请先登录';
        } else if (errorMsg.includes('404')) {
            errorTip = 'API接口不存在，可能需要重启服务器';
        } else if (errorMsg.includes('500')) {
            errorTip = '服务器内部错误';
        }

        container.innerHTML = `
            <div class="empty-state" style="padding:30px;">
                <p style="font-size:1.5rem;margin-bottom:12px;">⚠️</p>
                <p style="color:var(--danger-color);font-weight:500;">加载失败</p>
                ${errorTip ? `<p style="font-size:0.85rem;margin-top:8px;">${errorTip}</p>` : ''}
                <p style="font-size:0.8rem;color:var(--text-secondary);margin-top:12px;padding:8px;background:rgba(0,0,0,0.05);border-radius:6px;word-break:break-all;">
                    ${escapeHtml(errorMsg)}
                </p>
                <button class="btn btn-sm btn-outline mt-3" onclick="loadReceived()">🔄 重试</button>
            </div>`;
    }
}

// 确保API加载完成后再初始化
function initCollaboration() {
    if (typeof apiGet === 'undefined') {
        setTimeout(initCollaboration, 300);
        return;
    }
    loadMyTodosForShare();
    loadMyShares();
}

if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', initCollaboration);
} else {
    initCollaboration();
}
</script>
{% endblock %}
